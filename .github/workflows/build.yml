name: Build & Lint

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "AndroidModApp(segunda migro)"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Run Detekt
        run: gradle detekt --continue

      - name: Build debug APK
        run: gradle assembleDebug