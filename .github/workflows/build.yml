name: Build

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "AndroidModApp(segunda migro)"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Create CI support files
        run: |
          cat > gradle.properties <<PROPS
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC
          org.gradle.parallel=true
          org.gradle.caching=true
          PROPS

          cat > app/secrets.properties <<SECRETS
          signing_keystore_password=ci_placeholder
          signing_key_alias_release=release
          signing_key_alias_debug=debug
          SECRETS

          keytool -genkeypair -v \
            -keystore app/keystore.jks \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass ci_placeholder \
            -keypass ci_placeholder \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=US" 2>/dev/null

          cat > app/google-services.json <<JSON
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-placeholder",
              "storage_bucket": "ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "es.sebas1705.youknow"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "ci_placeholder_key" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Build debug APK
        run: gradle assembleDebug